<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-label="Watcher control flow diagram">
  <rect width="900" height="360" fill="#f8fafc"/>
  <text x="450" y="42" text-anchor="middle" font-family="Segoe UI, Arial" font-size="28" font-weight="700" fill="#111827">Watcher Control</text>
  <g font-family="Segoe UI, Arial" fill="#1f2937">
    <rect x="60" y="105" width="190" height="76" rx="10" fill="#ffffff" stroke="#b7c7df"/>
    <text x="155" y="137" text-anchor="middle" font-size="17" font-weight="700">Trigger</text>
    <text x="155" y="162" text-anchor="middle" font-size="13">text, image, value, state</text>
    <rect x="355" y="75" width="190" height="76" rx="10" fill="#ffffff" stroke="#84c79b"/>
    <text x="450" y="107" text-anchor="middle" font-size="17" font-weight="700">No Pause</text>
    <text x="450" y="132" text-anchor="middle" font-size="13">runs alongside</text>
    <rect x="355" y="210" width="190" height="76" rx="10" fill="#ffffff" stroke="#e0bf82"/>
    <text x="450" y="242" text-anchor="middle" font-size="17" font-weight="700">Pause Sequence</text>
    <text x="450" y="267" text-anchor="middle" font-size="13">watcher takes over</text>
    <rect x="650" y="210" width="190" height="76" rx="10" fill="#ffffff" stroke="#84c79b"/>
    <text x="745" y="242" text-anchor="middle" font-size="17" font-weight="700">Continue</text>
    <text x="745" y="267" text-anchor="middle" font-size="13">go to step or restart</text>
    <path d="M250 143 C295 143 315 113 355 113" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M250 143 C300 143 315 248 355 248" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M545 248 H650" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>